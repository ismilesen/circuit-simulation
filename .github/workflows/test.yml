name: Test Godot Install

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ngspice-wasm:
    name: Build WASM ngspice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache libngspice-44.2.zip
        id: cache-libngspice
        uses: actions/cache@v4
        with:
          path: libngspice-44.2.zip
          key: libngspice-44.2-${{ hashFiles('.github/docker/ngspice-wasm.Dockerfile') }}

      - name: Set up Docker Buildx
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build ngspice WASM image
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        run: docker build -f .github/docker/ngspice-wasm.Dockerfile -t ngspice-wasm-build .

      - name: Build libngspice-44.2.zip
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          if [ -x ./scripts/build_libngspice_wasm_docker.sh ]; then
            ./scripts/build_libngspice_wasm_docker.sh ./libngspice-44.2.zip
            exit 0
          fi

          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ngspice-wasm-build \
            bash -lc '
              set -euo pipefail
              source /opt/emsdk/emsdk_env.sh >/dev/null

              apply_patch_if_needed() {
                local patch_file="$1"
                if patch -N -p1 --dry-run < "$patch_file" >/dev/null 2>&1; then
                  patch -N -p1 < "$patch_file"
                fi
              }

              mkdir -p .tmp/ngspice-web-build
              cd .tmp/ngspice-web-build

              if [ ! -f ngspice-44.2.zip ]; then
                curl -L -o ngspice-44.2.zip https://github.com/danchitnis/ngspice-sf-mirror/archive/refs/tags/ngspice-44.2.zip
              fi
              if [ ! -d ngspice-sf-mirror-ngspice-44.2 ]; then
                unzip -q ngspice-44.2.zip
              fi

              cd ngspice-sf-mirror-ngspice-44.2

              apply_patch_if_needed /opt/pyodide-recipes/packages/libngspice/patches/0001-keep-alive-API-functions.patch
              apply_patch_if_needed /opt/pyodide-recipes/packages/libngspice/patches/0002-fix-hicum2-extern-c.patch
              apply_patch_if_needed /opt/pyodide-recipes/packages/libngspice/patches/0003-fix-verilog-install-hook.patch

              bash ./autogen.sh

              if [ ! -x build-native/src/xspice/cmpp/cmpp ]; then
                mkdir -p build-native
                cd build-native
                ../configure --enable-xspice --disable-debug --without-x --with-readline=no
                make -C src/xspice/cmpp -j ${PYODIDE_JOBS:-3}
                cd ..
              fi

              rm -rf release-lib /tmp/ng-install /work/.tmp/libngspice-package
              mkdir -p release-lib
              cd release-lib

              WASM_COMPILE_FLAGS="-O2 -fPIC -fwasm-exceptions -sSUPPORT_LONGJMP=wasm"
              WASM_LINK_FLAGS="-fwasm-exceptions -sSIDE_MODULE=1 -sSUPPORT_LONGJMP=wasm"

              ac_cv_func_queryperformancecounter=no emconfigure ../configure \
                --prefix=/tmp/ng-install \
                --enable-xspice \
                --disable-debug \
                --disable-dependency-tracking \
                --enable-cider \
                --with-readline=no \
                --disable-openmp \
                --with-ngshared \
                --host=wasm32-unknown-emscripten \
                CFLAGS="$WASM_COMPILE_FLAGS" \
                CXXFLAGS="$WASM_COMPILE_FLAGS" \
                LDFLAGS="$WASM_LINK_FLAGS"

              emmake make -j ${PYODIDE_JOBS:-3} -C src/xspice/cmpp \
                CFLAGS="$WASM_COMPILE_FLAGS" \
                CXXFLAGS="$WASM_COMPILE_FLAGS" \
                LDFLAGS="$WASM_LINK_FLAGS"
              cp ../build-native/src/xspice/cmpp/cmpp src/xspice/cmpp/cmpp
              touch src/xspice/cmpp/cmpp

              emmake make -j ${PYODIDE_JOBS:-3} \
                CFLAGS="$WASM_COMPILE_FLAGS" \
                CXXFLAGS="$WASM_COMPILE_FLAGS" \
                LDFLAGS="$WASM_LINK_FLAGS"
              emmake make install

              /opt/emsdk/upstream/bin/wasm-dis /tmp/ng-install/lib/libngspice.so -o /tmp/libngspice.wast
              python3 -c '"'"'import re,sys; s=open("/tmp/libngspice.wast","r",errors="ignore").read(); imports=set(re.findall(r"\(import \"env\" \"([^\"]+)\"", s)); banned=sorted(name for name in imports if name=="emscripten_longjmp" or name.startswith("invoke_")); (print("ERROR: Incompatible imports in libngspice.so:", file=sys.stderr), [print(f"  - {name}", file=sys.stderr) for name in banned], sys.exit(1)) if banned else None'"'"'

              mkdir -p /work/.tmp/libngspice-package/ngspice/lib/ngspice
              cp /tmp/ng-install/lib/libngspice.so /work/.tmp/libngspice-package/ngspice/libngspice.so
              cp /tmp/ng-install/lib/ngspice/*.cm /work/.tmp/libngspice-package/ngspice/lib/ngspice/
            '

          OUT_ZIP="$PWD/libngspice-44.2.zip"
          rm -f "$OUT_ZIP"
          (cd .tmp/libngspice-package && zip -qry "$OUT_ZIP" ngspice)
          if command -v zipinfo >/dev/null 2>&1; then
            ZIP_ENTRIES="$(zipinfo -1 "$OUT_ZIP")"
          else
            ZIP_ENTRIES="$(unzip -l "$OUT_ZIP" | awk '"'"'NR > 3 && $0 !~ /^--------/ { print $4 }'"'"')"
          fi
          if ! printf "%s\n" "$ZIP_ENTRIES" | grep -Eq "(^|/)libngspice\\.so$"; then
            echo "ERROR: Built libngspice-44.2.zip is missing libngspice.so"
            printf "%s\n" "$ZIP_ENTRIES" | sed -n '1,120p'
            exit 1
          fi

      - name: Upload WASM ngspice artifact
        uses: actions/upload-artifact@v4
        with:
          name: libngspice-wasm-zip
          path: libngspice-44.2.zip
          retention-days: 30

  test-godot:
    needs: build-ngspice-wasm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download WASM ngspice artifact
        uses: actions/download-artifact@v4
        with:
          name: libngspice-wasm-zip
          path: ./

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - name: Verify installed web templates
        run: |
          set -euo pipefail
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          ls -la "$TEMPLATE_DIR"
          test -f "$TEMPLATE_DIR/web_dlink_nothreads_release.zip"
          test -f "$TEMPLATE_DIR/web_dlink_nothreads_debug.zip"

      - name: Install SCons
        run: sudo apt-get update && sudo apt-get install -y scons

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Download ngspice header
        run: |
          mkdir -p ngspice
          curl -L https://raw.githubusercontent.com/ngspice/ngspice/master/src/include/ngspice/sharedspice.h \
            -o ngspice/sharedspice.h

      - name: Remove legacy duplicate GDExtension descriptor
        run: |
          rm -f project/bin/circuit_sim.gdextension project/bin/circuit_sim.gdextension.uid

      - name: Build GDExtension libraries
        run: |
          mkdir -p project/bin
          scons platform=linux target=template_debug
          scons platform=linux target=template_release
          scons platform=web target=template_debug threads=no
          scons platform=web target=template_release threads=no

      - name: Check build
        run: ls project/bin

      - name: Normalize web GDExtension filenames
        run: |
          set -euo pipefail
          BIN_DIR="project/bin"
          ACTUAL_RELEASE="$(ls "$BIN_DIR"/libcircuit_sim.web.template_release.wasm32*.wasm 2>/dev/null | head -n 1 || true)"
          if [ -z "$ACTUAL_RELEASE" ]; then
            echo "Could not find built web release wasm in $BIN_DIR"
            ls -la "$BIN_DIR"
            exit 1
          fi

          for EXPECTED in \
            "$BIN_DIR/libcircuit_sim.web.template_release.wasm32.wasm" \
            "$BIN_DIR/libcircuit_sim.web.template_release.wasm32.nothreads.wasm"
          do
            if [ ! -f "$EXPECTED" ]; then
              cp "$ACTUAL_RELEASE" "$EXPECTED"
            fi
          done

      - name: Validate release web GDExtension binary exists
        run: |
          set -euo pipefail
          gdext_count="$(find project -type f -name '*.gdextension' | wc -l | tr -d ' ')"
          if [ "$gdext_count" -ne 1 ]; then
            echo "Expected exactly one .gdextension file in project/, found $gdext_count"
            find project -type f -name '*.gdextension' -print
            exit 1
          fi
          rel_path="$(grep -E '^web\.release\.wasm32' project/circuit_sim.gdextension | sed -E 's/.*"res:\/\/([^"]+)".*/\1/' | head -n 1)"
          if [ -z "$rel_path" ]; then
            echo "Missing web.release.wasm32 entry in project/circuit_sim.gdextension"
            exit 1
          fi
          file_path="project/$rel_path"
          if [ ! -f "$file_path" ]; then
            echo "Missing release web GDExtension library referenced by circuit_sim.gdextension: $file_path"
            ls -la project/bin
            exit 1
          fi

      - name: Export Web builds
        run: |
          cd project
          mkdir -p build/web/release
          godot --headless --export-release "Web" build/web/release/index.html

      - name: Package web upload bridge and dev server
        run: |
          cp project/web/upload_bridge.js project/build/web/release/upload_bridge.js
          cp project/web/server.js project/build/web/release/server.js

      - name: Package ngspice WASM files in web release
        run: |
          set -euo pipefail
          tmp_unpack="$(mktemp -d)"
          unzip -oq ./libngspice-44.2.zip -d "$tmp_unpack"
          found_lib="$(find "$tmp_unpack" -type f -name 'libngspice.so' | head -n 1 || true)"
          if [ -z "$found_lib" ]; then
            echo "ERROR: libngspice.so not found in libngspice-44.2.zip"
            echo "Archive entries:"
            unzip -l ./libngspice-44.2.zip | sed -n '1,120p'
            exit 1
          fi
          mkdir -p project/build/web/release/ngspice/lib/ngspice
          cp "$found_lib" project/build/web/release/ngspice/libngspice.so
          find "$tmp_unpack" -type f -name '*.cm' -exec cp {} project/build/web/release/ngspice/lib/ngspice/ \;
          rm -rf "$tmp_unpack"

      - name: Patch index.html ngspice preload
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const htmlPath = "project/build/web/release/index.html";
          let html = fs.readFileSync(htmlPath, "utf8");
          const configRegex = /const GODOT_CONFIG = (\{[\s\S]*?\});/;
          const match = html.match(configRegex);
          if (!match) throw new Error("Could not find GODOT_CONFIG in index.html");
          const config = JSON.parse(match[1]);
          const libs = Array.isArray(config.gdextensionLibs) ? config.gdextensionLibs.filter(Boolean) : [];
          const circuitLibPattern = /^libcircuit_sim\.web\.template_.*\.wasm$/;
          const circuitLibs = libs.filter((lib) => circuitLibPattern.test(lib));
          const preferredCircuitLib =
            circuitLibs.find((lib) => lib.includes("template_release") && lib.includes("nothreads")) ||
            circuitLibs.find((lib) => lib.includes("template_release")) ||
            circuitLibs[0] ||
            "libcircuit_sim.web.template_release.wasm32.nothreads.wasm";
          const deduped = [];
          for (const lib of libs) {
            if (circuitLibPattern.test(lib)) continue;
            if (!deduped.includes(lib)) deduped.push(lib);
          }
          if (!deduped.includes(preferredCircuitLib)) deduped.unshift(preferredCircuitLib);
          if (!deduped.includes("ngspice/libngspice.so")) deduped.push("ngspice/libngspice.so");
          config.gdextensionLibs = deduped;
          html = html.replace(configRegex, `const GODOT_CONFIG = ${JSON.stringify(config)};`);
          fs.writeFileSync(htmlPath, html);
          NODE

      - name: Validate ngspice web packaging
        run: |
          set -euo pipefail
          test -f project/build/web/release/upload_bridge.js
          test -f project/build/web/release/server.js
          test -f project/build/web/release/ngspice/libngspice.so
          grep -Eq 'ngspice/libngspice\.so' project/build/web/release/index.html
          node <<'NODE'
          const fs = require("fs");
          const html = fs.readFileSync("project/build/web/release/index.html", "utf8");
          const match = html.match(/const GODOT_CONFIG = (\{[\s\S]*?\});/);
          if (!match) throw new Error("Could not parse GODOT_CONFIG");
          const config = JSON.parse(match[1]);
          const libs = Array.isArray(config.gdextensionLibs) ? config.gdextensionLibs : [];
          const circuitLibs = libs.filter((lib) => /^libcircuit_sim\.web\.template_.*\.wasm$/.test(lib));
          if (circuitLibs.length !== 1) {
            throw new Error(`Expected exactly 1 libcircuit_sim web side module, found ${circuitLibs.length}: ${JSON.stringify(circuitLibs)}`);
          }
          if (!libs.includes("ngspice/libngspice.so")) {
            throw new Error("ngspice/libngspice.so is missing from gdextensionLibs");
          }
          NODE

      - name: Show build output
        run: ls -R project/build/web

      - name: Prepare Pages artifact (web build only)
        run: |
          set -euo pipefail
          rm -rf pages-dist
          mkdir -p pages-dist
          cp -R project/build/web/release/. pages-dist/
          test -f pages-dist/index.html
          test -f pages-dist/index.pck
          test -f pages-dist/index.wasm

      - name: Download sky130 and xschem symbol libraries
        run: |
          set -euo pipefail

          mkdir -p pages-dist/symbols

          # ── Helper: fetch all .sym/.sch from one subdirectory of a repo ──
          fetch_sym_dir() {
            local REPO="$1"      # e.g. StefanSchippers/xschem_sky130
            local BRANCH="$2"    # e.g. main
            local SUBDIR="$3"    # e.g. sky130_fd_pr  (empty string = repo root)
            local DEST="$4"      # local destination dir under pages-dist/symbols/

            echo "Fetching ${REPO}/${SUBDIR} → pages-dist/symbols/${DEST}"

            # GitHub Trees API returns every path in the repo recursively
            local API_URL="https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1"
            local TREE
            TREE="$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API_URL")"

            # Filter to .sym and .sch files under SUBDIR, then download each
            echo "$TREE" \
              | python3 - "$SUBDIR" "$REPO" "$BRANCH" "$DEST" <<'PYEOF'
          import sys, json, os, urllib.request, pathlib

          subdir, repo, branch, dest = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          data   = json.load(sys.stdin)
          errors = 0

          for item in data.get("tree", []):
              p = item["path"]
              # Must be under the requested subdir (or root if subdir is empty)
              if subdir and not (p == subdir or p.startswith(subdir + "/")):
                  continue
              if not (p.endswith(".sym") or p.endswith(".sch")):
                  continue

              # Strip the subdir prefix to get the relative path inside dest
              rel = p[len(subdir):].lstrip("/") if subdir else p
              out = pathlib.Path("pages-dist/symbols") / dest / rel
              out.parent.mkdir(parents=True, exist_ok=True)

              url = f"https://raw.githubusercontent.com/{repo}/{branch}/{p}"
              try:
                  urllib.request.urlretrieve(url, out)
              except Exception as e:
                  print(f"WARN: failed {url}: {e}", file=sys.stderr)
                  errors += 1

          print(f"  done — {errors} errors")
          PYEOF
          }

          # ── sky130 primitive devices (nfet, pfet, diodes, resistors, caps…) ──
          fetch_sym_dir \
            "StefanSchippers/xschem_sky130" "main" \
            "sky130_fd_pr" \
            "sky130_fd_pr"

          # ── sky130 standard cells (inverters, nands, flops…) ──
          fetch_sym_dir \
            "StefanSchippers/xschem_sky130" "main" \
            "sky130_fd_sc_hd" \
            "sky130_fd_sc_hd"

          # ── xschem built-in devices (gnd, vdd, vsource, iprobe, code…) ──
          fetch_sym_dir \
            "StefanSchippers/xschem" "master" \
            "xschem_library/devices" \
            "xschem_library/devices"

          echo "Symbol tree:"
          find pages-dist/symbols -type f | sort | head -60

      - name: Generate symbol index
        run: |
          node <<'NODE'
          const fs   = require("fs");
          const path = require("path");

          // Recursively collect all .sym and .sch under a directory
          function scan(dir, urlPrefix) {
            const out = {};
            if (!fs.existsSync(dir)) return out;

            function walk(current) {
              for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
                const full = path.join(current, entry.name);
                if (entry.isDirectory()) {
                  walk(full);
                } else if (entry.name.endsWith(".sym") || entry.name.endsWith(".sch")) {
                  // Key: path relative to pages-dist/symbols/, no extension
                  // e.g. "sky130_fd_pr/nfet_01v8"
                  // This matches exactly what appears inside .sch C-line braces
                  const rel = path.relative("pages-dist/symbols", full)
                                .replace(/\\/g, "/")
                                .replace(/\.(sym|sch)$/, "");
                  out[rel] = "symbols/" + path.relative("pages-dist/symbols", full)
                                .replace(/\\/g, "/");
                }
              }
            }
            walk(dir);
            return out;
          }

          const index = {
            ...scan("pages-dist/symbols/sky130_fd_pr",    "sky130_fd_pr"),
            ...scan("pages-dist/symbols/sky130_fd_sc_hd", "sky130_fd_sc_hd"),
            ...scan("pages-dist/symbols/xschem_library",  "xschem_library"),
          };

          fs.writeFileSync(
            "pages-dist/symbols/index.json",
            JSON.stringify(index, null, 2)
          );

          console.log(`Symbol index written: ${Object.keys(index).length} entries`);
          // Print a few examples so the log is easy to verify
          Object.entries(index).slice(0, 5).forEach(([k, v]) =>
            console.log(`  ${k}  →  ${v}`)
          );
          NODE

      - name: Validate symbol packaging
        run: |
          set -euo pipefail
          # Must have the index
          test -f pages-dist/symbols/index.json

          # Must have at least the core primitive devices
          test -f pages-dist/symbols/sky130_fd_pr/nfet_01v8.sym || \
            test -f pages-dist/symbols/sky130_fd_pr/sky130_fd_pr__nfet_01v8.sym

          # Must have xschem builtins
          test -f pages-dist/symbols/xschem_library/devices/gnd.sym

          # Index must not be empty
          python3 -c "
          import json
          idx = json.load(open('pages-dist/symbols/index.json'))
          assert len(idx) > 50, f'Index too small: {len(idx)} entries'
          print(f'OK — {len(idx)} symbols indexed')
          "
          
      - name: Upload web release artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: project/build/web/release
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: test-godot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
