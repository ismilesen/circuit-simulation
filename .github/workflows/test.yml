name: Test Godot Install

on:
  push:
    branches: [ main ]

jobs:
  test-godot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0 # https://www.nuget.org/packages/GodotSharp#versions-body-tab
          use-dotnet: false

      - name: Check Godot version
        run: godot --version
        
      - name: Test godot engine
        run: godot --headless --editor --quit
    
      - name: List repository files
        run: ls

      - name: Show export presets
        run: cat export_presets.cfg