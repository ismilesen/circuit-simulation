name: Test Threaded Godot Web Export

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      sky130_open_pdks_commit:
        description: "open_pdks commit hash for the Sky130 Ciel bundle"
        required: false
        default: "44a43c23c81b45b8e774ae7a84899a5a778b6b0b"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKY130_OPEN_PDKS_COMMIT: ${{ github.event.inputs.sky130_open_pdks_commit || '44a43c23c81b45b8e774ae7a84899a5a778b6b0b' }}

jobs:
  build-ngspice-wasm:
    name: Build WASM ngspice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache libngspice-44.2.zip
        id: cache-libngspice
        uses: actions/cache@v4
        with:
          path: libngspice-44.2.zip
          key: libngspice-44.2-threaded-${{ hashFiles('.github/docker/ngspice-wasm.Dockerfile', 'scripts/build_libngspice_wasm_docker.sh') }}

      - name: Set up Docker Buildx
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build ngspice WASM image
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        run: docker build -f .github/docker/ngspice-wasm.Dockerfile -t ngspice-wasm-build .

      - name: Build libngspice-44.2.zip
        if: steps.cache-libngspice.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          THREADS=yes ./scripts/build_libngspice_wasm_docker.sh ./libngspice-44.2.zip
          if command -v zipinfo >/dev/null 2>&1; then
            ZIP_ENTRIES="$(zipinfo -1 ./libngspice-44.2.zip)"
          else
            ZIP_ENTRIES="$(unzip -l ./libngspice-44.2.zip | awk 'NR > 3 && $0 !~ /^--------/ { print $4 }')"
          fi
          if ! printf "%s\n" "$ZIP_ENTRIES" | grep -Eq "(^|/)libngspice\\.so$"; then
            echo "ERROR: Built libngspice-44.2.zip is missing libngspice.so"
            printf "%s\n" "$ZIP_ENTRIES" | sed -n '1,120p'
            exit 1
          fi

      - name: Upload WASM ngspice artifact
        uses: actions/upload-artifact@v4
        with:
          name: libngspice-wasm-zip
          path: libngspice-44.2.zip
          retention-days: 30

  test-godot:
    needs: build-ngspice-wasm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download WASM ngspice artifact
        uses: actions/download-artifact@v4
        with:
          name: libngspice-wasm-zip
          path: ./

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - name: Verify installed web templates
        run: |
          set -euo pipefail
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          ls -la "$TEMPLATE_DIR"
          test -f "$TEMPLATE_DIR/web_dlink_release.zip"
          test -f "$TEMPLATE_DIR/web_dlink_debug.zip"

      - name: Install SCons
        run: sudo apt-get update && sudo apt-get install -y scons

      - name: Install Ciel
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade --no-cache-dir ciel
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ciel" --version

      - name: Cache Sky130 PDK
        uses: actions/cache@v4
        with:
          path: ~/.ciel
          key: sky130-ciel-${{ env.SKY130_OPEN_PDKS_COMMIT }}

      - name: Download ngspice header
        run: |
          mkdir -p ngspice
          curl -L https://raw.githubusercontent.com/ngspice/ngspice/master/src/include/ngspice/sharedspice.h \
            -o ngspice/sharedspice.h

      - name: Remove legacy duplicate GDExtension descriptor
        run: |
          rm -f project/bin/circuit_sim.gdextension project/bin/circuit_sim.gdextension.uid

      - name: Build desktop GDExtension libraries
        run: |
          mkdir -p project/bin
          scons platform=linux target=template_debug
          scons platform=linux target=template_release

      - name: Build ngspice WASM image
        run: docker build -f .github/docker/ngspice-wasm.Dockerfile -t ngspice-wasm-build .

      - name: Build threaded web GDExtension libraries
        run: |
          THREADS=yes TARGET=template_debug ./scripts/build_web_gdextension_docker.sh
          THREADS=yes TARGET=template_release ./scripts/build_web_gdextension_docker.sh

      - name: Check build
        run: ls project/bin

      - name: Validate threaded web GDExtension filenames
        run: |
          set -euo pipefail
          BIN_DIR="project/bin"
          test -f "$BIN_DIR/libcircuit_sim.web.template_debug.wasm32.wasm"
          test -f "$BIN_DIR/libcircuit_sim.web.template_release.wasm32.wasm"
          if find "$BIN_DIR" -maxdepth 1 -type f -name 'libcircuit_sim.web.*.nothreads.wasm' | grep -q .; then
            echo "ERROR: threaded web build must not produce or package .nothreads wasm artifacts"
            find "$BIN_DIR" -maxdepth 1 -type f -name 'libcircuit_sim.web.*.wasm' -print
            exit 1
          fi

      - name: Validate release web GDExtension binary exists
        run: |
          set -euo pipefail
          gdext_count="$(find project -type f -name '*.gdextension' | wc -l | tr -d ' ')"
          if [ "$gdext_count" -ne 1 ]; then
            echo "Expected exactly one .gdextension file in project/, found $gdext_count"
            find project -type f -name '*.gdextension' -print
            exit 1
          fi
          rel_path="$(grep -E '^web\.release\.wasm32' project/circuit_sim.gdextension | sed -E 's/.*"res:\/\/([^"]+)".*/\1/' | head -n 1)"
          if [ -z "$rel_path" ]; then
            echo "Missing web.release.wasm32 entry in project/circuit_sim.gdextension"
            exit 1
          fi
          file_path="project/$rel_path"
          if [ ! -f "$file_path" ]; then
            echo "Missing release web GDExtension library referenced by circuit_sim.gdextension: $file_path"
            ls -la project/bin
            exit 1
          fi

      - name: Export Web builds
        run: |
          cd project
          mkdir -p build/web/release
          godot --headless --export-release "Web" build/web/release/index.html

      - name: Apply ngspice web post-export setup
        run: ./scripts/enable_ngspice_web_export.sh project/build/web/release ./libngspice-44.2.zip

      - name: Build Sky130 browser PDK bundle
        run: |
          set -euo pipefail
          ciel enable --pdk-family sky130 "$SKY130_OPEN_PDKS_COMMIT"
          python3 scripts/build_pdk_web_bundle.py \
            --pdk-root "$HOME/.ciel" \
            --output project/build/web/release/pdks

      - name: Validate Sky130 browser PDK bundle
        run: |
          set -euo pipefail
          test -f project/build/web/release/pdks/sky130/manifest.json
          python3 -m json.tool project/build/web/release/pdks/sky130/manifest.json >/dev/null
          python3 <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("project/build/web/release/pdks/sky130/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          symbols = manifest.get("symbols", [])
          files = manifest.get("files", [])
          if not symbols:
              raise SystemExit("Sky130 browser PDK manifest has no symbols")
          if not files:
              raise SystemExit("Sky130 browser PDK manifest has no files")
          missing = [
              entry["path"]
              for entry in files
              if not (manifest_path.parent / entry["path"]).is_file()
          ]
          if missing:
              raise SystemExit(f"Sky130 browser PDK manifest references missing files: {missing[:10]}")
          print(f"Validated {len(symbols)} Sky130 symbols and {len(files)} bundled files.")
          PY

      - name: Validate ngspice web packaging
        run: |
          set -euo pipefail
          EXPORT_DIR="project/build/web/release"
          require_file() {
            if [ ! -f "$1" ]; then
              echo "ERROR: expected export file is missing: $1"
              echo "Export directory contents:"
              find "$EXPORT_DIR" -maxdepth 2 -type f | sort
              exit 1
            fi
          }
          require_pattern() {
            local pattern="$1"
            local file="$2"
            local description="$3"
            if ! grep -Eq "$pattern" "$file"; then
              echo "ERROR: missing $description in $file"
              exit 1
            fi
          }
          require_file "$EXPORT_DIR/index.html"
          require_file "$EXPORT_DIR/upload_bridge.js"
          require_file "$EXPORT_DIR/server.js"
          require_file "$EXPORT_DIR/libngspice.so"
          require_file "$EXPORT_DIR/ngspice/libngspice.so"
          require_pattern 'libngspice\.so' "$EXPORT_DIR/index.html" "libngspice preload"
          require_pattern 'const GODOT_THREADS_ENABLED = true;' "$EXPORT_DIR/index.html" "threaded Godot export flag"
          if grep -Eq '^progressive_web_app/enabled=true$' project/export_presets.cfg; then
            require_file "$EXPORT_DIR/index.service.worker.js"
            require_pattern '"serviceWorker":"index\.service\.worker\.js"' "$EXPORT_DIR/index.html" "service worker config"
            require_pattern "Content-Encoding" "$EXPORT_DIR/index.service.worker.js" "service worker content-encoding cleanup"
          fi
          if find project/build/web/release -maxdepth 1 -type f -name 'libcircuit_sim.web.*.nothreads.wasm' | grep -q .; then
            echo "ERROR: web export contains stale .nothreads wasm artifacts"
            find project/build/web/release -maxdepth 1 -type f -name 'libcircuit_sim.web.*.wasm' -print
            exit 1
          fi
          node <<'NODE'
          const fs = require("fs");
          const html = fs.readFileSync("project/build/web/release/index.html", "utf8");
          const match = html.match(/const GODOT_CONFIG = (\{[\s\S]*?\});/);
          if (!match) throw new Error("Could not parse GODOT_CONFIG");
          const config = JSON.parse(match[1]);
          const libs = Array.isArray(config.gdextensionLibs) ? config.gdextensionLibs : [];
          const circuitLibs = libs.filter((lib) => /^libcircuit_sim\.web\.template_.*\.wasm$/.test(lib));
          if (!circuitLibs.includes("libcircuit_sim.web.template_release.wasm32.wasm")) {
            throw new Error(`Missing release libcircuit_sim web side module: ${JSON.stringify(circuitLibs)}`);
          }
          const unexpectedCircuitLibs = circuitLibs.filter((lib) => {
            return lib !== "libcircuit_sim.web.template_release.wasm32.wasm" &&
              lib !== "libcircuit_sim.web.template_debug.wasm32.wasm";
          });
          if (unexpectedCircuitLibs.length > 0) {
            throw new Error(`Unexpected libcircuit_sim web side module(s): ${JSON.stringify(unexpectedCircuitLibs)}`);
          }
          if (circuitLibs.some((lib) => lib.includes("nothreads"))) {
            throw new Error(`Threaded export references a non-threaded GDExtension: ${JSON.stringify(circuitLibs)}`);
          }
          if (!libs.includes("libngspice.so")) {
            throw new Error("libngspice.so is missing from gdextensionLibs");
          }
          NODE

      - name: Validate exported wasm modules use shared memory
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ngspice-wasm-build \
            bash -lc '
              set -euo pipefail
              source /opt/emsdk/emsdk_env.sh >/dev/null
              find project/build/web/release -type f \( -name "*.wasm" -o -name "*.so" -o -name "*.cm" \) | sort | while read -r f; do
                /opt/emsdk/upstream/bin/wasm-dis "$f" -o /tmp/check.wast >/dev/null
                memory_import="$(grep -m1 "(import \"env\" \"memory\"" /tmp/check.wast || true)"
                echo "$f :: $memory_import"
                case "$memory_import" in
                  *" shared)"*) ;;
                  *) echo "ERROR: $f does not import shared memory"; exit 1 ;;
                esac
              done
            '

      - name: Show build output
        run: ls -R project/build/web

      - name: Prepare Pages artifact (web build only)
        run: |
          set -euo pipefail
          rm -rf pages-dist
          mkdir -p pages-dist
          cp -R project/build/web/release/. pages-dist/
          test -f pages-dist/index.html
          test -f pages-dist/index.pck
          test -f pages-dist/index.wasm
          test -f pages-dist/pdks/sky130/manifest.json
          
      - name: Upload web release artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: project/build/web/release
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: test-godot
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
